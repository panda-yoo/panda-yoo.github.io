title: Panda Yoo
name: Pranav Shinde

description: >
  Physics student working in Quantum Computing,
  Machine Learning, Numerical Methods, and Scientific Computing.

url: "https://panda-yoo.github.io"
baseurl: ""

remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: default

search: true
timezone: Asia/Kolkata
locale: en-US

markdown: kramdown
highlighter: rouge

permalink: /:categories/:title/

include:
  - _pages

collections:
  projects:
    output: true
    permalink: /projects/:path/

paginate: 5
paginate_path: /page:num/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-gist
  - jemoji
  - jekyll-include-cache

author:
  name: "Pranav Shinde"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "Physics student | Quantum Computing | CFD | ML"
  location: "India"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/panda-yoo"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/panda-yoo"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: false
      related: true

  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: projects
    values:
      layout: single
      author_profile: true
      share: false

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/